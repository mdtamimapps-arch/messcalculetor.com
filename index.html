<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>দি অক্টা স্কোয়াড - মেস ম্যানেজমেন্ট (মাল্টি বাইয়ার, দ্বিভাষিক সংখ্যা)</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Noto Sans Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2ff;
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            padding: 2rem 1rem;
            color: #0f172a;
        }
        .memo-container {
            max-width: 1280px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        /* header */
        .memo-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 1.5rem 2rem;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }
        .squad-title {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .squad-title i { font-size: 2rem; color: #facc15; }
        .date-badge {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        /* info panel */
        .info-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            background: #f8fafc;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-field {
            flex: 1;
            min-width: 200px;
        }
        .info-field label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #334155;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }
        .info-field input, .info-field .tag-input-wrapper {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            background: white;
            transition: 0.2s;
        }
        .info-field input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        /* multi-select tag input (Buy by) */
        .tag-input-wrapper {
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            background: white;
            padding: 0.4rem 0.6rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            cursor: text;
        }
        .tag-item {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 32px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0f172a;
        }
        .tag-item i {
            cursor: pointer;
            font-size: 0.7rem;
            color: #64748b;
        }
        .tag-item i:hover { color: #dc2626; }
        .tag-input {
            border: none;
            outline: none;
            flex: 1;
            min-width: 100px;
            padding: 6px 4px;
            font-family: inherit;
            font-size: 0.85rem;
            background: transparent;
        }
        /* table */
        .table-wrapper { overflow-x: auto; padding: 0 1.5rem 1rem 1.5rem; }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 650px;
        }
        .items-table th {
            text-align: left;
            padding: 1rem 0.75rem;
            background: #f1f5f9;
            font-weight: 600;
        }
        .items-table td {
            padding: 0.9rem 0.75rem;
            border-bottom: 1px solid #eef2ff;
        }
        .items-table tr:hover td { background: #fef9e3; }
        .action-btns button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 0 4px;
        }
        .edit-btn { color: #2563eb; }
        .delete-btn { color: #dc2626; }
        .total-row { background: #fef9e3; font-weight: 700; }
        .total-row td { border-top: 2px solid #facc15; padding: 1rem 0.75rem; }
        /* product form */
        .product-form {
            margin: 1rem 2rem 2rem 2rem;
            background: #f9fafb;
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .form-group {
            flex: 2;
            min-width: 150px;
            position: relative;
        }
        .form-group.small { flex: 1; }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        button {
            font-family: inherit;
            font-weight: 600;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-2px); }
        .btn-warning { background: #eab308; color: #0f172a; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .print-area {
            display: flex;
            justify-content: flex-end;
            margin: 0 2rem 2rem 2rem;
            gap: 12px;
        }
        /* suggestion dropdown */
        .suggestions-box {
            position: absolute;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            max-height: 200px;
            overflow-y: auto;
            width: calc(100% - 2px);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .suggestions-box div {
            padding: 10px 16px;
            cursor: pointer;
        }
        .suggestions-box div:hover { background: #eef2ff; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .product-form, .print-area, .action-btns, .btn-group, .tag-input, .tag-item i { display: none !important; }
            .info-panel, .memo-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .tag-item { background: none; border: 1px solid #ccc; }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="memo-container">
    <div class="memo-header">
        <div class="squad-title"><i class="fas fa-utensils"></i><span>The_Octa_Squad</span></div>
        <div class="date-badge" id="currentDateDisplay"></div>
    </div>

    <div class="info-panel">
        <!-- Manager field with auto-suggest (datalist) -->
        <div class="info-field">
            <label><i class="fas fa-user-tie"></i> ম্যানেজারের নাম (Manager)</label>
            <input type="text" id="managerName" list="memberListAuto" placeholder="নির্বাচন করুন বা লিখুন" autocomplete="off">
            <datalist id="memberListAuto">
                <option value="Lalon">
                <option value="Sammo">
                <option value="Saif">
                <option value="Mehedi (ohona past, Tanjina present)">
                <option value="Pranto">
                <option value="akash">
                <option value="samiul">
                <option value="MMH TAMIM">
            </datalist>
        </div>
        <!-- Buy by field - MULTI SELECT tag input (1 or more names) -->
        <div class="info-field">
            <label><i class="fas fa-user-check"></i> Buy by (ক্রয়কারী) — একাধিক নাম যোগ করুন</label>
            <div class="tag-input-wrapper" id="buyByWrapper">
                <div id="buyByTagsContainer" class="tags-container" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
                <input type="text" id="buyByInput" class="tag-input" placeholder="টাইপ করুন ও এন্টার বা কমা দিন" autocomplete="off" list="memberListBuy">
                <datalist id="memberListBuy">
                    <option value="Lalon">
                    <option value="Sammo">
                    <option value="Saif">
                    <option value="Mehedi (ohona)">
                    <option value="Pranto">
                    <option value="akash">
                    <option value="samiul">
                    <option value="MMH TAMIM">
                </datalist>
            </div>
            <input type="hidden" id="buyByHidden" value="">
        </div>
    </div>

    <!-- বাজারের টেবিল -->
    <div class="table-wrapper">
        <table class="items-table" id="itemsTable">
            <thead><tr><th>ক্রমিক #</th><th>পণ্যের নাম</th><th>পরিমাণ</th><th>দাম/একক</th><th>মোট</th><th>অ্যাকশন</th></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot><tr class="total-row"><td colspan="4" style="text-align:right;">সর্বমোট (Grand Total):</td><td id="grandTotalCell">০.০০ টাকা</td><td></td></tr></tfoot>
        </table>
    </div>

    <!-- পণ্য যোগ / সম্পাদনা ফর্ম (Bengali & English number support) -->
    <div class="product-form">
        <div class="form-title"><i class="fas fa-cart-plus"></i> <span id="formModeLabel">পণ্য যোগ করুন</span></div>
        <div class="form-grid">
            <div class="form-group" style="position: relative;">
                <label>পণ্যের নাম (বাংলা/ইং)</label>
                <input type="text" id="itemNameInput" placeholder="যেমন: সবজি, মাছ" autocomplete="off">
                <div id="suggestionList" class="suggestions-box" style="display:none;"></div>
            </div>
            <div class="form-group small">
                <label>পরিমাণ (দ্বিভাষিক সংখ্যা)</label>
                <input type="text" id="itemQuantity" placeholder="যেমন: ১.৫ বা 2" value="1">
            </div>
            <div class="form-group small">
                <label>দাম/একক (দ্বিভাষিক)</label>
                <input type="text" id="itemPrice" placeholder="যেমন: ৪৫ বা 45" value="0">
            </div>
        </div>
        <div class="btn-group">
            <button id="addItemBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> আইটেম যোগ করুন</button>
            <button id="updateItemBtn" class="btn-warning" style="display: none;"><i class="fas fa-sync-alt"></i> হালনাগাদ</button>
            <button id="cancelEditBtn" class="btn-secondary" style="display: none;"><i class="fas fa-times"></i> বাতিল</button>
        </div>
        <div style="font-size:0.7rem; margin-top:10px;"><i class="fas fa-keyboard"></i> পরামর্শ: সংখ্যা বাংলায় (১,২,৩) বা ইংরেজিতে (1,2,3) লিখুন, সিস্টেম নিজে চিনবে।</div>
    </div>

    <div class="print-area">
        <button id="printPdfBtn" class="btn-primary"><i class="fas fa-print"></i> PDF / প্রিন্ট</button>
        <button id="clearAllBtn" class="btn-danger"><i class="fas fa-trash-alt"></i> সব মুছুন</button>
    </div>
    <footer>মেস ম্যানেজমেন্ট | একাধিক ক্রেতা যোগ করার ব্যবস্থা | দ্বিভাষিক সংখ্যা সমর্থন</footer>
</div>

<script>
    // ---------- পণ্যের রেকমেন্ডেশন লিস্ট ----------
    const bengaliProductList = [
        "সবজি", "মাছ", "মাংস", "ডিম", "তেল", "চাল", "ডাল", "পেঁয়াজ", "রসুন", "আদা", "লবণ", "মরিচ", "হলুদ", "জিরা",
        "ধনিয়া", "আলু", "টমেটো", "পটল", "করলা", "কুমড়ো", "শশা", "লাউ", "বেগুন", "মুলা", "কপি", "ফুলকপি", "বাঁধাকপি",
        "শিম", "চিচিঙ্গা", "ধনে পাতা", "লেবু", "ঘি", "সরিষার তেল", "চিনি", "গুড়", "আটা", "ময়দা", "সুজি", "চিড়া", "মুড়ি",
        "বেসন", "দই", "দুধ", "পনির", "মুরগি", "গরুর মাংস", "খাসির মাংস", "ইলিশ", "রুই", "কাতলা", "চিংড়ি", "পাউরুটি",
        "বিস্কুট", "চা", "কফি", "সাবান", "ডিটারজেন্ট", "মসলা", "জিরা গুঁড়া", "ধনিয়া গুঁড়া", "মরিচ গুঁড়া"
    ];
    
    // ---------- গ্লোবাল ডাটা ----------
    let itemsArray = [];
    let nextId = 1;
    let editMode = false;
    let editItemId = null;
    
    // Multi-select Buy By: store selected names array
    let selectedBuyers = [];   // array of strings
    
    // DOM elements
    const tableBody = document.getElementById('tableBody');
    const grandTotalCell = document.getElementById('grandTotalCell');
    const itemNameInput = document.getElementById('itemNameInput');
    const itemQuantity = document.getElementById('itemQuantity');
    const itemPrice = document.getElementById('itemPrice');
    const addBtn = document.getElementById('addItemBtn');
    const updateBtn = document.getElementById('updateItemBtn');
    const cancelBtn = document.getElementById('cancelEditBtn');
    const formModeLabel = document.getElementById('formModeLabel');
    const printBtn = document.getElementById('printPdfBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const managerNameInput = document.getElementById('managerName');
    const buyByTagsContainer = document.getElementById('buyByTagsContainer');
    const buyByInput = document.getElementById('buyByInput');
    const buyByHidden = document.getElementById('buyByHidden');
    const suggestionBox = document.getElementById('suggestionList');
    
    // ---------- Helper: Bengali to English digits conversion ----------
    function convertBengaliToEnglishNum(str) {
        const bengaliDigits = { '০': '0', '১': '1', '২': '2', '৩': '3', '৪': '4', '৫': '5', '৬': '6', '৭': '7', '৮': '8', '৯': '9' };
        return str.replace(/[০-৯]/g, d => bengaliDigits[d]);
    }
    function parseNumericInput(value) {
        let cleaned = convertBengaliToEnglishNum(value);
        cleaned = cleaned.replace(/[^0-9.]/g, '');
        const num = parseFloat(cleaned);
        return isNaN(num) ? 0 : num;
    }
    // format number for display (keeps original look, but we show english digit)
    function formatNumberForDisplay(num) {
        return num.toFixed(2);
    }
    
    // ---------- Multi-select tag logic for Buy by ----------
    function renderBuyByTags() {
        buyByTagsContainer.innerHTML = '';
        selectedBuyers.forEach((buyer, idx) => {
            const tagSpan = document.createElement('span');
            tagSpan.className = 'tag-item';
            tagSpan.innerHTML = `${escapeHtml(buyer)} <i class="fas fa-times-circle remove-buyer" data-index="${idx}"></i>`;
            buyByTagsContainer.appendChild(tagSpan);
        });
        // attach remove event
        document.querySelectorAll('.remove-buyer').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const index = parseInt(icon.getAttribute('data-index'));
                if (!isNaN(index)) {
                    selectedBuyers.splice(index, 1);
                    renderBuyByTags();
                    updateBuyByHidden();
                }
            });
        });
        updateBuyByHidden();
    }
    function addBuyer(name) {
        name = name.trim();
        if (name === "") return;
        if (!selectedBuyers.includes(name)) {
            selectedBuyers.push(name);
            renderBuyByTags();
        }
        buyByInput.value = '';
    }
    function updateBuyByHidden() {
        buyByHidden.value = selectedBuyers.join(', ');
    }
    // event for buy by input: enter, comma, or datalist selection
    buyByInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            let val = buyByInput.value.replace(/,/g, '').trim();
            if (val) addBuyer(val);
        }
    });
    buyByInput.addEventListener('blur', () => {
        let val = buyByInput.value.trim();
        if (val) addBuyer(val);
    });
    // optional: datalist click handled by input change
    buyByInput.addEventListener('change', () => {
        let val = buyByInput.value.trim();
        if (val) addBuyer(val);
    });
    // default preselected buyers: example one name (optional)
    function setDefaultBuyers() {
        if (selectedBuyers.length === 0) {
            selectedBuyers.push("Lalon");
            renderBuyByTags();
        }
    }
    
    // ---------- Date update ----------
    function updateDate() {
        const now = new Date();
        const banglaDate = now.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        document.getElementById('currentDateDisplay').innerText = banglaDate + " | " + now.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });
    }
    updateDate();
    setInterval(updateDate, 60000);
    
    // ---------- Items CRUD ----------
    function calculateGrandTotal() {
        return itemsArray.reduce((sum, item) => sum + item.total, 0);
    }
    function renderTable() {
        tableBody.innerHTML = '';
        if (itemsArray.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">📭 কোনো পণ্য যোগ করা হয়নি। ফর্ম দিয়ে যোগ করুন।</td></tr>`;
            grandTotalCell.innerText = '০.০০ টাকা';
            return;
        }
        itemsArray.forEach((item, idx) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${idx+1}</td>
                <td style="font-weight:500;">${escapeHtml(item.name)}</td>
                <td>${item.quantity}</td>
                <td>${item.price.toFixed(2)} ট.</td>
                <td>${item.total.toFixed(2)} ট.</td>
                <td class="action-btns">
                    <button class="edit-btn" data-id="${item.id}"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                </td>
            `;
            tableBody.appendChild(row);
        });
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                enterEditMode(id);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                if (confirm('মুছে ফেলতে চান?')) {
                    itemsArray = itemsArray.filter(i => i.id !== id);
                    if (editMode && editItemId === id) resetFormToAddMode();
                    renderTable();
                }
            });
        });
        grandTotalCell.innerText = calculateGrandTotal().toFixed(2) + ' টাকা';
    }
    
    function enterEditMode(id) {
        const item = itemsArray.find(i => i.id === id);
        if (!item) return;
        editMode = true;
        editItemId = id;
        itemNameInput.value = item.name;
        itemQuantity.value = item.quantity;   // original numeric value shows as english digit
        itemPrice.value = item.price;
        addBtn.style.display = 'none';
        updateBtn.style.display = 'inline-flex';
        cancelBtn.style.display = 'inline-flex';
        formModeLabel.innerHTML = '<i class="fas fa-pen-alt"></i> পণ্য হালনাগাদ করুন';
        document.querySelector('.product-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function resetFormToAddMode() {
        editMode = false;
        editItemId = null;
        itemNameInput.value = '';
        itemQuantity.value = '1';
        itemPrice.value = '0';
        addBtn.style.display = 'inline-flex';
        updateBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
        formModeLabel.innerHTML = '<i class="fas fa-cart-plus"></i> পণ্য যোগ করুন';
        hideSuggestions();
    }
    
    function addOrUpdateItem() {
        let name = itemNameInput.value.trim();
        if (name === "") { alert("পণ্যের নাম দিন"); return; }
        // parse quantity & price with bengali support
        let rawQty = itemQuantity.value;
        let rawPrice = itemPrice.value;
        let quantity = parseNumericInput(rawQty);
        let price = parseNumericInput(rawPrice);
        if (quantity <= 0) { alert("পরিমাণ ০ এর বেশি দিন (বাংলা বা ইংরেজি সংখ্যা)"); return; }
        if (price < 0) { alert("দাম সঠিক দিন"); return; }
        const total = quantity * price;
        if (editMode && editItemId !== null) {
            const index = itemsArray.findIndex(i => i.id === editItemId);
            if (index !== -1) {
                itemsArray[index] = { ...itemsArray[index], name, quantity, price, total };
            }
            resetFormToAddMode();
        } else {
            const newItem = { id: nextId++, name, quantity, price, total };
            itemsArray.push(newItem);
            itemNameInput.value = '';
            itemQuantity.value = '1';
            itemPrice.value = '0';
        }
        renderTable();
        hideSuggestions();
    }
    
    function clearAllItems() {
        if (itemsArray.length && confirm("সব বাজারের আইটেম রিসেট করবেন?")) {
            itemsArray = [];
            nextId = 1;
            resetFormToAddMode();
            renderTable();
        }
    }
    
    // ---------- Product suggestions ----------
    function showSuggestions(filter) {
        if (!filter || filter.length === 0) { hideSuggestions(); return; }
        const lower = filter.toLowerCase();
        const filtered = bengaliProductList.filter(p => p.toLowerCase().startsWith(lower) || p.startsWith(filter));
        if (filtered.length === 0) { hideSuggestions(); return; }
        suggestionBox.innerHTML = '';
        filtered.forEach(prod => {
            const div = document.createElement('div');
            div.textContent = prod;
            div.addEventListener('click', () => {
                itemNameInput.value = prod;
                hideSuggestions();
                itemNameInput.focus();
            });
            suggestionBox.appendChild(div);
        });
        suggestionBox.style.display = 'block';
    }
    function hideSuggestions() { suggestionBox.style.display = 'none'; }
    itemNameInput.addEventListener('input', (e) => showSuggestions(e.target.value));
    document.addEventListener('click', (e) => {
        if (!itemNameInput.contains(e.target) && !suggestionBox.contains(e.target)) hideSuggestions();
    });
    
    // ---------- Print PDF ----------
    function printAsPDF() {
        // Ensure any empty name warnings not needed
        window.print();
    }
    
    // Helper escape
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // Load demo items for show
    function loadDemoItems() {
        if (itemsArray.length === 0) {
            itemsArray.push({ id: nextId++, name: "সবজি (মিক্স)", quantity: 2, price: 45, total: 90 });
            itemsArray.push({ id: nextId++, name: "মাছ (রুই)", quantity: 1.5, price: 280, total: 420 });
            itemsArray.push({ id: nextId++, name: "ডিম", quantity: 12, price: 12, total: 144 });
            renderTable();
        }
    }
    
    // Event listeners
    addBtn.addEventListener('click', addOrUpdateItem);
    updateBtn.addEventListener('click', addOrUpdateItem);
    cancelBtn.addEventListener('click', resetFormToAddMode);
    printBtn.addEventListener('click', printAsPDF);
    clearAllBtn.addEventListener('click', clearAllItems);
    
    // Manager default suggestion (already has datalist)
    managerNameInput.value = "Lalon";  // default one
    
    // initialize multi buyer
    setDefaultBuyers();
    
    // allow both English/Bengali digits live inside quantity & price fields: convert on blur & show numeric clarity
    function setupBilingualNumberInputs() {
        const inputs = [itemQuantity, itemPrice];
        inputs.forEach(inp => {
            inp.addEventListener('blur', function() {
                let val = this.value;
                let numeric = parseNumericInput(val);
                if (!isNaN(numeric)) {
                    this.value = numeric.toString();  // show english digit but user can type bengali next time
                } else {
                    if (this.id === 'itemQuantity') this.value = '1';
                    else this.value = '0';
                }
            });
        });
    }
    setupBilingualNumberInputs();
    
    loadDemoItems();
    
    // final sync for buyers hidden field for consistency (print shows comma separated)
    function updateBuyByHidden() { buyByHidden.value = selectedBuyers.join(', '); }
    
    // fix hidden on any change
    window.updateBuyByHidden = updateBuyByHidden;
</script>
</body>
</html>
